<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Medina Baye Niass - Garage Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0B0F19;
            color: #FFFFFF;
            overflow-x: hidden;
            position: relative;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1A1F2E;
        }

        ::-webkit-scrollbar-thumb {
            background: #D4AF37;
            border-radius: 4px;
        }

        /* Typography */
        h1, h2, h3, .logo {
            font-family: 'Syne', sans-serif;
        }

        /* Gradient Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(16, 185, 129, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
            position: relative;
            z-index: 1;
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(11, 15, 25, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            background: rgba(11, 15, 25, 0.98);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #D4AF37 0%, #FFD700 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: #FFFFFF;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: #D4AF37;
        }

        .menu-toggle {
            display: none;
            font-size: 1.8rem;
            cursor: pointer;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 100px 0 50px;
        }

        .hero-content {
            flex: 1;
            z-index: 2;
        }

        .hero-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50px;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }

        .hero h1 {
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #FFFFFF 0%, #D4AF37 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 2rem;
            max-width: 500px;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-outline {
            border: 2px solid #D4AF37;
            color: #D4AF37;
            background: transparent;
        }

        .btn-outline:hover {
            background: #D4AF37;
            color: #0B0F19;
            transform: translateY(-2px);
        }

        .counter-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.2);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .counter-number {
            font-size: 3.5rem;
            font-weight: 800;
            color: #D4AF37;
            font-family: 'Syne', sans-serif;
        }

        /* Bento Grid */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin: 4rem 0;
        }

        .bento-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .bento-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(212, 175, 55, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .bento-card:hover::before {
            opacity: 1;
        }

        .bento-card:hover {
            transform: translateY(-5px);
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .bento-icon {
            font-size: 2.5rem;
            color: #D4AF37;
            margin-bottom: 1.5rem;
        }

        /* Vehicle Cards */
        .vehicles-grid, .services-grid, .location-grid, .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .vehicle-card, .service-card, .location-card, .product-card {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .vehicle-card:hover, .service-card:hover, .location-card:hover, .product-card:hover {
            transform: translateY(-10px);
            border-color: #D4AF37;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .vehicle-image, .service-image, .location-image, .product-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: linear-gradient(135deg, #1A1F2E 0%, #0B0F19 100%);
        }

        .vehicle-info, .service-info, .location-info, .product-info {
            padding: 1.5rem;
        }

        .vehicle-price {
            font-size: 1.8rem;
            color: #D4AF37;
            font-weight: 700;
            margin: 0.5rem 0;
        }

        .stock-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .in-stock {
            background: rgba(16, 185, 129, 0.2);
            color: #10B981;
            border: 1px solid #10B981;
        }

        .out-stock {
            background: rgba(239, 68, 68, 0.2);
            color: #EF4444;
            border: 1px solid #EF4444;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #0B0F19;
            border-radius: 32px;
            max-width: 500px;
            width: 90%;
            padding: 2rem;
            border: 1px solid #D4AF37;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #1A1F2E 25%, #2A2F3E 50%, #1A1F2E 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 2rem 0;
        }

        .filter-btn {
            padding: 0.75rem 1.5rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: #D4AF37;
            color: #0B0F19;
            border-color: #D4AF37;
        }

        /* Search Bar */
        .search-bar {
            width: 100%;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* Reviews */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .review-card {
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .rating {
            color: #D4AF37;
            margin: 0.5rem 0;
        }

        /* Floating WhatsApp */
        .whatsapp-float {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #25D366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: all 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: rgba(11, 15, 25, 0.98);
                flex-direction: column;
                padding: 1rem;
                text-align: center;
            }

            .nav-links.active {
                display: flex;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .bento-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Before After Slider */
        .before-after {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
            border-radius: 20px;
            cursor: ew-resize;
        }

        .before-img, .after-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slider-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #D4AF37;
            left: 50%;
            transform: translateX(-50%);
            cursor: ew-resize;
        }

        .section-title {
            font-size: 2.5rem;
            margin: 3rem 0 2rem;
            text-align: center;
        }

        footer {
            background: #0B0F19;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding: 3rem 0;
            margin-top: 4rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">MEDINA BAYE NIASS</div>
            <div class="menu-toggle" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </div>
            <ul class="nav-links">
                <li><a onclick="navigateTo('home')">Accueil</a></li>
                <li><a onclick="navigateTo('services')">Services</a></li>
                <li><a onclick="navigateTo('vente')">Vente</a></li>
                <li><a onclick="navigateTo('location')">Location</a></li>
                <li><a onclick="navigateTo('boutique')">Boutique</a></li>
                <li><a onclick="navigateTo('avis')">Avis</a></li>
                <li><a onclick="navigateTo('contact')">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" id="app">
        <!-- Dynamic content will be loaded here -->
    </div>

    <div class="whatsapp-float" onclick="openWhatsApp()">
        <i class="fab fa-whatsapp fa-2x"></i>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <footer>
        <div class="container">
            <p style="text-align: center;">&copy; 2024 Medina Baye Niass - Garage Premium</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD4m9zBnm3_v7ONPYBZwDRLZ94sXeELYGI",
            authDomain: "site-djibril.firebaseapp.com",
            projectId: "site-djibril",
            storageBucket: "site-djibril.firebasestorage.app",
            messagingSenderId: "577455734",
            appId: "1:577455734:web:50567f26b225878052c157",
            measurementId: "G-J9DXPKN448"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const analytics = getAnalytics(app);

        let currentSection = 'home';
        let allVehicles = [];
        let allProducts = [];

        // Navigation
        window.navigateTo = (section) => {
            currentSection = section;
            renderSection(section);
            document.querySelector('.nav-links').classList.remove('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.toggleMenu = () => {
            document.querySelector('.nav-links').classList.toggle('active');
        };

        // Render functions
        async function renderSection(section) {
            const appDiv = document.getElementById('app');
            switch(section) {
                case 'home':
                    appDiv.innerHTML = renderHome();
                    await loadCounter();
                    break;
                case 'services':
                    appDiv.innerHTML = renderServices();
                    await loadServices();
                    break;
                case 'vente':
                    appDiv.innerHTML = renderVente();
                    await loadVehicles();
                    break;
                case 'location':
                    appDiv.innerHTML = renderLocation();
                    await loadLocationVehicles();
                    break;
                case 'boutique':
                    appDiv.innerHTML = renderBoutique();
                    await loadProducts();
                    break;
                case 'avis':
                    appDiv.innerHTML = renderAvis();
                    await loadReviews();
                    break;
                case 'contact':
                    appDiv.innerHTML = renderContact();
                    break;
            }
        }

        function renderHome() {
            return `
                <section class="hero">
                    <div class="hero-content">
                        <div class="hero-badge">
                            <i class="fas fa-gem"></i> Excellence Automobile
                        </div>
                        <h1>L'élite automobile<br>à votre service</h1>
                        <p>Découvrez une expérience unique où la passion de l'automobile rencontre l'excellence du service.</p>
                        <div class="cta-buttons">
                            <button class="btn btn-primary" onclick="openDevisModal()">
                                <i class="fas fa-file-invoice"></i> Devis Gratuit
                            </button>
                            <button class="btn btn-outline" onclick="window.open('tel:+221781234567')">
                                <i class="fas fa-phone"></i> Appel Rapide
                            </button>
                        </div>
                    </div>
                    <div class="counter-card">
                        <div class="counter-number" id="clientCounter">0</div>
                        <p>Clients Satisfaits</p>
                        <i class="fas fa-chart-line"></i>
                    </div>
                </section>

                <div class="bento-grid">
                    <div class="bento-card" onclick="navigateTo('services')">
                        <div class="bento-icon"><i class="fas fa-tools"></i></div>
                        <h3>Services Premium</h3>
                        <p>Diagnostic, entretien et réparation par des experts</p>
                    </div>
                    <div class="bento-card" onclick="navigateTo('vente')">
                        <div class="bento-icon"><i class="fas fa-car"></i></div>
                        <h3>Vente de Véhicules</h3>
                        <p>La meilleure sélection de véhicules d'occasion</p>
                    </div>
                    <div class="bento-card" onclick="navigateTo('location')">
                        <div class="bento-icon"><i class="fas fa-key"></i></div>
                        <h3>Location</h3>
                        <p>Flexibilité et liberté sur mesure</p>
                    </div>
                    <div class="bento-card" onclick="navigateTo('boutique')">
                        <div class="bento-icon"><i class="fas fa-microchip"></i></div>
                        <h3>Pièces Détachées</h3>
                        <p>Qualité originale et garantie</p>
                    </div>
                </div>
            `;
        }

        function renderServices() {
            return `
                <h2 class="section-title">Nos Services Premium</h2>
                <div class="services-grid" id="servicesGrid">
                    ${Array(3).fill().map(() => '<div class="skeleton" style="height:300px"></div>').join('')}
                </div>
            `;
        }

        function renderVente() {
            return `
                <h2 class="section-title">Véhicules en Vente</h2>
                <div class="filter-bar">
                    <button class="filter-btn active" onclick="filterVehicles('all')">Tous</button>
                    <button class="filter-btn" onclick="filterVehicles('berline')">Berline</button>
                    <button class="filter-btn" onclick="filterVehicles('suv')">SUV</button>
                    <button class="filter-btn" onclick="filterVehicles('sport')">Sport</button>
                </div>
                <div class="vehicles-grid" id="vehiclesGrid">
                    ${Array(6).fill().map(() => '<div class="skeleton" style="height:350px"></div>').join('')}
                </div>
            `;
        }

        function renderLocation() {
            return `
                <h2 class="section-title">Location de Véhicules</h2>
                <div class="location-grid" id="locationGrid">
                    ${Array(3).fill().map(() => '<div class="skeleton" style="height:300px"></div>').join('')}
                </div>
            `;
        }

        function renderBoutique() {
            return `
                <h2 class="section-title">Boutique Pièces Détachées</h2>
                <input type="text" class="search-bar" placeholder="Rechercher une pièce..." onkeyup="searchProducts(this.value)">
                <div class="products-grid" id="productsGrid">
                    ${Array(6).fill().map(() => '<div class="skeleton" style="height:300px"></div>').join('')}
                </div>
            `;
        }

        function renderAvis() {
            return `
                <h2 class="section-title">Avis Clients</h2>
                <div style="text-align:center; margin-bottom:2rem;">
                    <div class="average-rating" id="averageRating">4.8 ★</div>
                </div>
                <div class="reviews-grid" id="reviewsGrid">
                    ${Array(3).fill().map(() => '<div class="skeleton" style="height:200px"></div>').join('')}
                </div>
            `;
        }

        function renderContact() {
            return `
                <h2 class="section-title">Contactez-nous</h2>
                <div class="bento-grid">
                    <div class="bento-card">
                        <i class="fas fa-map-marker-alt"></i>
                        <h3>Adresse</h3>
                        <p>Dakar, Sénégal</p>
                    </div>
                    <div class="bento-card">
                        <i class="fas fa-phone"></i>
                        <h3>Téléphone</h3>
                        <p>+221 78 123 45 67</p>
                    </div>
                    <div class="bento-card">
                        <i class="fas fa-envelope"></i>
                        <h3>Email</h3>
                        <p>contact@medinabayeniass.sn</p>
                    </div>
                </div>
            `;
        }

        // Load data from Firebase
        async function loadCounter() {
            const querySnapshot = await getDocs(collection(db, 'clients'));
            const count = querySnapshot.size;
            const counterElement = document.getElementById('clientCounter');
            if(counterElement) animateNumber(counterElement, 0, count, 2000);
        }

        async function loadServices() {
            const servicesGrid = document.getElementById('servicesGrid');
            const querySnapshot = await getDocs(collection(db, 'services'));
            if(!querySnapshot.empty) {
                servicesGrid.innerHTML = querySnapshot.docs.map(doc => `
                    <div class="service-card">
                        <img src="${doc.data().image || 'https://via.placeholder.com/400x300'}" class="service-image">
                        <div class="service-info">
                            <h3>${doc.data().name}</h3>
                            <p>${doc.data().description}</p>
                            <p class="vehicle-price">${doc.data().price || 'Sur devis'}</p>
                            <button class="btn btn-primary" onclick="openDevisModal()">Demander un devis</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function loadVehicles() {
            const querySnapshot = await getDocs(collection(db, 'vehicules_vente'));
            allVehicles = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            displayVehicles(allVehicles);
        }

        window.filterVehicles = (category) => {
            const filtered = category === 'all' ? allVehicles : allVehicles.filter(v => v.category === category);
            displayVehicles(filtered);
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        };

        function displayVehicles(vehicles) {
            const vehiclesGrid = document.getElementById('vehiclesGrid');
            if(vehiclesGrid) {
                vehiclesGrid.innerHTML = vehicles.map(vehicle => `
                    <div class="vehicle-card" onclick="showVehicleDetail('${vehicle.id}')">
                        <img src="${vehicle.images?.[0] || 'https://via.placeholder.com/400x300'}" class="vehicle-image">
                        <div class="vehicle-info">
                            <h3>${vehicle.marque} ${vehicle.modele}</h3>
                            <p>${vehicle.annee} - ${vehicle.kilometrage} km</p>
                            <p class="vehicle-price">${vehicle.prix.toLocaleString()} FCFA</p>
                            <button class="btn btn-outline" onclick="event.stopPropagation(); simulateLoan(${vehicle.prix})">
                                Simuler mensualité
                            </button>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function loadLocationVehicles() {
            const locationGrid = document.getElementById('locationGrid');
            const querySnapshot = await getDocs(collection(db, 'vehicules_location'));
            if(locationGrid) {
                locationGrid.innerHTML = querySnapshot.docs.map(doc => `
                    <div class="location-card">
                        <img src="${doc.data().image || 'https://via.placeholder.com/400x300'}" class="location-image">
                        <div class="location-info">
                            <h3>${doc.data().marque} ${doc.data().modele}</h3>
                            <p class="vehicle-price">${doc.data().prix_journalier.toLocaleString()} FCFA/jour</p>
                            <button class="btn btn-primary" onclick="openLocationModal('${doc.id}')">Réserver</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function loadProducts() {
            const querySnapshot = await getDocs(collection(db, 'pieces_detachees'));
            allProducts = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            displayProducts(allProducts);
        }

        window.searchProducts = (searchTerm) => {
            const filtered = allProducts.filter(p => 
                p.nom.toLowerCase().includes(searchTerm.toLowerCase()) ||
                p.reference.toLowerCase().includes(searchTerm.toLowerCase())
            );
            displayProducts(filtered);
        };

        function displayProducts(products) {
            const productsGrid = document.getElementById('productsGrid');
            if(productsGrid) {
                productsGrid.innerHTML = products.map(product => `
                    <div class="product-card">
                        <img src="${product.image || 'https://via.placeholder.com/400x300'}" class="product-image">
                        <div class="product-info">
                            <h3>${product.nom}</h3>
                            <p>Réf: ${product.reference}</p>
                            <p class="vehicle-price">${product.prix.toLocaleString()} FCFA</p>
                            <span class="stock-badge ${product.stock > 0 ? 'in-stock' : 'out-stock'}">
                                ${product.stock > 0 ? `Stock: ${product.stock}` : 'Précommander'}
                            </span>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function loadReviews() {
            const querySnapshot = await getDocs(collection(db, 'avis'));
            const reviews = querySnapshot.docs.map(doc => doc.data());
            const avgRating = reviews.reduce((sum, r) => sum + r.note, 0) / reviews.length;
            
            const reviewsGrid = document.getElementById('reviewsGrid');
            const avgElement = document.getElementById('averageRating');
            
            if(avgElement) avgElement.innerHTML = `${avgRating.toFixed(1)} ★ (${reviews.length} avis)`;
            
            if(reviewsGrid) {
                reviewsGrid.innerHTML = reviews.map(review => `
                    <div class="review-card">
                        <h3>${review.nom}</h3>
                        <div class="rating">${'★'.repeat(Math.floor(review.note))}${review.note % 1 ? '½' : ''}</div>
                        <p>${review.commentaire}</p>
                        <small>${new Date(review.date).toLocaleDateString()}</small>
                    </div>
                `).join('');
            }
        }

        window.openDevisModal = () => {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <h2>Demande de Devis</h2>
                <form id="devisForm">
                    <input type="text" placeholder="Nom complet" required style="width:100%; padding:0.75rem; margin:0.5rem 0; background:#1A1F2E; border:1px solid #D4AF37; color:white; border-radius:8px;">
                    <input type="email" placeholder="Email" required style="width:100%; padding:0.75rem; margin:0.5rem 0; background:#1A1F2E; border:1px solid #D4AF37; color:white; border-radius:8px;">
                    <input type="tel" placeholder="Téléphone" required style="width:100%; padding:0.75rem; margin:0.5rem 0; background:#1A1F2E; border:1px solid #D4AF37; color:white; border-radius:8px;">
                    <textarea placeholder="Description du besoin" rows="4" required style="width:100%; padding:0.75rem; margin:0.5rem 0; background:#1A1F2E; border:1px solid #D4AF37; color:white; border-radius:8px;"></textarea>
                    <button type="submit" class="btn btn-primary" style="width:100%">Envoyer la demande</button>
                </form>
            `;
            modal.classList.add('active');
            
            document.getElementById('devisForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                await addDoc(collection(db, 'devis'), {
                    nom: formData.get('nom'),
                    email: formData.get('email'),
                    telephone: formData.get('telephone'),
                    message: formData.get('message'),
                    date: new Date(),
                    status: 'pending'
                });
                modal.classList.remove('active');
                alert('Demande envoyée avec succès!');
            });
        };

        window.simulateLoan = (price) => {
            const mensualite = price / 24;
            alert(`Simulation de crédit:\nPrix: ${price.toLocaleString()} FCFA\nDurée: 24 mois\nMensualité: ${Math.round(mensualite).toLocaleString()} FCFA`);
        };

        function animateNumber(element, start, end, duration) {
            const range = end - start;
            const increment = range / (duration / 16);
            let current = start;
            const timer = setInterval(() => {
                current += increment;
                if(current >= end) {
                    clearInterval(timer);
                    current = end;
                }
                element.textContent = Math.floor(current);
            }, 16);
        }

        window.openWhatsApp = () => {
            window.open('https://wa.me/221781234567', '_blank');
        };

        // Intersection Observer for scroll animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.1 });

        document.addEventListener('DOMContentLoaded', () => {
            renderSection('home');
            
            // Animate elements on scroll
            const elements = document.querySelectorAll('.bento-card, .vehicle-card, .service-card');
            elements.forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(30px)';
                el.style.transition = 'all 0.6s ease';
                observer.observe(el);
            });

            // Navbar scroll effect
            window.addEventListener('scroll', () => {
                const navbar = document.querySelector('.navbar');
                if(window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });
        });

        window.showVehicleDetail = (id) => {
            const vehicle = allVehicles.find(v => v.id === id);
            if(vehicle) {
                const modal = document.getElementById('modal');
                const modalContent = document.getElementById('modalContent');
                modalContent.innerHTML = `
                    <h2>${vehicle.marque} ${vehicle.modele}</h2>
                    <img src="${vehicle.images?.[0]}" style="width:100%; border-radius:12px; margin:1rem 0;">
                    <p><strong>Année:</strong> ${vehicle.annee}</p>
                    <p><strong>Kilométrage:</strong> ${vehicle.kilometrage} km</p>
                    <p><strong>Prix:</strong> ${vehicle.prix.toLocaleString()} FCFA</p>
                    <button class="btn btn-primary" onclick="window.open('https://wa.me/221781234567?text=Je%20suis%20intéressé%20par%20${vehicle.marque}%20${vehicle.modele}')">Contacter via WhatsApp</button>
                `;
                modal.classList.add('active');
            }
        };

        window.openLocationModal = (id) => {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <h2>Réservation de véhicule</h2>
                <form id="locationForm">
                    <input type="text" placeholder="Nom complet" required style="width:100%; padding:0.75rem; margin:0.5rem 0; background:#1A1F2E; border:1px solid #D4AF37; color:white; border-radius:8px;">
                    <input type="email" placeholder="Email" required style="width:100%; padding:0.75rem; margin:0.5rem 0; background:#1A1F2E; border:1px solid #D4AF37; color:white; border-radius:8px;">
                    <input type="date" id="startDate" required style="width:100%; padding:0.75rem; margin:0.5rem 0; background:#1A1F2E; border:1px solid #D4AF37; color:white; border-radius:8px;">
                    <input type="date" id="endDate" required style="width:100%; padding:0.75rem; margin:0.5rem 0; background:#1A1F2E; border:1px solid #D4AF37; color:white; border-radius:8px;">
                    <input type="file" id="permis" accept="image/*" required style="width:100%; padding:0.75rem; margin:0.5rem 0; background:#1A1F2E; border:1px solid #D4AF37; color:white; border-radius:8px;">
                    <button type="submit" class="btn btn-primary" style="width:100%">Réserver</button>
                </form>
            `;
            modal.classList.add('active');
            
            document.getElementById('locationForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const file = document.getElementById('permis').files[0];
                if(file) {
                    const storageRef = ref(storage, `permis/${Date.now()}_${file.name}`);
                    await uploadBytes(storageRef, file);
                    const url = await getDownloadURL(storageRef);
                    await addDoc(collection(db, 'reservations_location'), {
                        vehicleId: id,
                        nom: e.target[0].value,
                        email: e.target[1].value,
                        startDate: document.getElementById('startDate').value,
                        endDate: document.getElementById('endDate').value,
                        permisUrl: url,
                        date: new Date()
                    });
                    modal.classList.remove('active');
                    alert('Réservation envoyée avec succès!');
                }
            });
        };
    </script>
</body>
</html>
